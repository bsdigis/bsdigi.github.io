<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kevin Jump Game</title>
    <meta name="description" content="Kevin's mini browser game. Press Space to jump over obstacles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <main class="page">
      <section class="panel hero">
        <p class="eyebrow">Kevin</p>
        <h1>Kevin Jump Game</h1>
        <p class="lead">
          Press <strong>Space</strong> to jump and avoid obstacles. Survive longer to score higher.
        </p>
      </section>

      <section class="panel game-panel">
        <div class="game-header">
          <h2>Runner</h2>
          <div class="scoreboard">
            <span>Score: <strong id="score">0</strong></span>
            <span>Best: <strong id="best-score">0</strong></span>
          </div>
        </div>
        <canvas id="game-canvas" width="860" height="260" aria-label="Kevin jump game area"></canvas>
        <p id="game-message" class="game-message">Press Space to start. Press Space again to jump.</p>
        <div class="actions">
          <button id="restart-btn" class="btn secondary" type="button">Restart</button>
        </div>
      </section>

      <section class="panel">
        <h2>Controls</h2>
        <p class="control-hint">
          Space: jump. If game over, press Space or Restart to play again.
          On mobile, tap the game area to jump.
        </p>
      </section>
    </main>
    <script src="assets/js/game.js"></script>
  </body>
</html>
